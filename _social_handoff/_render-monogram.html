<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Montserrat:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1080px; background:#1a1816; overflow:hidden; }
  .wrap { width:1080px; height:1080px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px; }
  .mv { font-family:'Cormorant Garamond', serif; font-weight:400; font-size:520px; letter-spacing:0.12em; color:#FAF8F5; line-height:1; padding-right:0; padding-left:0.08em; }
  .divider { width:220px; height:2px; background:#D4B896; opacity:0.55; }
  .sub { font-family:'Montserrat', sans-serif; font-weight:500; font-size:38px; letter-spacing:0.32em; color:#FAF8F5; opacity:0.72; }
</style>
</head><body>
<div class="wrap">
  <div class="mv">MV</div>
  <div class="divider"></div>
  <div class="sub">MY VILLA</div>
</div>
</body></html>
