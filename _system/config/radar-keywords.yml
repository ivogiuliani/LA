# MyVilla — Radar Keyword Clusters
# Source: radar_pipeline.py
# Used by: scripts/radar.py
#
# ──────────────────────────────────────────────────────────────────────
# STRATEGIC FOCUS (updated 2026-04-19 — see content_strategy.md)
# ──────────────────────────────────────────────────────────────────────
# Target buyer: ultra-wealthy Californians commissioning or rebuilding
# luxury homes who want the home to stay INSURABLE and RESILIENT through
# the next wildfire cycle — not just recover from the last one.
#
# Priority geographies (ordered):
#   1. Malibu, Beverly Hills
#   2. Bel Air, Holmby Hills, Brentwood, Hidden Hills, Calabasas
#   3. Mandeville Canyon, Topanga, Pacific Palisades (still relevant,
#      reduced weight vs. prior config)
#   4. Montecito, Newport Coast, Santa Barbara Foothills (secondary CA luxury)
#
# Primary content angles:
#   - "Building new" luxury + insurable (not only post-fire rebuild)
#   - California home-insurance crisis statewide (FAIR Plan, non-renewals,
#     IBHS discounts, Mercury / AAA / USAA policy shifts)
#   - Reinforced concrete / ICF residential construction
#   - Italian / Mediterranean villa typology in California
#   - 2026 WUI Code + Safer from Wildfires + IBHS Wildfire Prepared Home Plus
#
# SECONDARY (do not lead with): Palisades/Altadena rebuild news.
# These remain in scope but are no longer the top commercial target.


clusters:
  # ── Cluster A: Luxury New-Build & Insurability (PRIMARY) ──
  luxury_insurable_newbuild:
    id: "A"
    label: "Luxury Insurable New-Build"
    priority: 1
    keywords:
      - "luxury home builder Malibu"
      - "custom home Beverly Hills"
      - "fire-resistant luxury home California"
      - "insurable luxury home California"
      - "Bel Air custom home builder"
      - "Brentwood new construction luxury"
      - "Hidden Hills custom home"
      - "Calabasas luxury villa"
      - "Mandeville Canyon custom home"
      - "luxury spec home Westside Los Angeles"
      - "new construction insurance California"
      - "ultra high net worth homebuilder California"

  # ── Cluster B: Materials & Fire-Resilient Construction ──
  materials_construction:
    id: "B"
    label: "Materials & Construction"
    priority: 1
    keywords:
      - "reinforced concrete home California"
      - "concrete home Malibu"
      - "ICF home California luxury"
      - "fire-resistant home design California"
      - "Class A roof home California"
      - "non-combustible home California"
      - "fireproof luxury house California"
      - "concrete vs wood frame fire insurance"
      - "IBHS Wildfire Prepared Home Plus"
      - "defensible space luxury home California"

  # ── Cluster C: Insurance & Regulation (Statewide) ──
  insurance_regulation:
    id: "C"
    label: "Insurance & Regulation"
    priority: 1
    keywords:
      - "California home insurance crisis 2026"
      - "California FAIR Plan luxury home"
      - "fire insurance non-renewal California"
      - "Mercury wildfire discount IBHS"
      - "AAA California homeowners insurance rebuild"
      - "USAA California fire insurance"
      - "WUI Code California 2026"
      - "Safer from Wildfires 12 measures"
      - "California insurance commissioner wildfire"
      - "private insurance HNW California wildfire"
      - "Prop 103 California insurance 2026"

  # ── Cluster D: Italian & Mediterranean Villa Typology ──
  italian_mediterranean_villa:
    id: "D"
    label: "Italian & Mediterranean Villa"
    priority: 1
    keywords:
      - "Italian villa Los Angeles"
      - "Mediterranean villa California"
      - "Tuscan style home California"
      - "Italian architect Los Angeles"
      - "European architect custom home LA"
      - "modern Italian house California"
      - "palazzo style California home"
      - "Italian design luxury home LA"

  # ── Cluster E: Luxury Real Estate Market (Westside + coastal) ──
  luxury_real_estate:
    id: "E"
    label: "Luxury Real Estate LA"
    priority: 2
    keywords:
      - "Malibu luxury home market 2026"
      - "Beverly Hills real estate luxury 2026"
      - "Bel Air new construction market"
      - "Westside LA luxury real estate"
      - "ultra luxury home sale Los Angeles"
      - "high end home sale Malibu"
      - "Montecito luxury real estate"
      - "Newport Coast luxury home"
      # ── expanded 2026-06-01 for section balance (more market angles) ──
      - "Brentwood luxury home sale 2026"
      - "Pacific Palisades luxury listing 2026"
      - "Holmby Hills estate sale"
      - "Calabasas luxury real estate market"
      - "LA luxury housing market trends 2026"
      - "California mansion record sale 2026"
      - "celebrity home sale Los Angeles 2026"
      - "luxury new construction premium California"
      - "spec mansion Los Angeles 2026"
      - "trophy home Beverly Hills"

  # ── Cluster H: Climate, Resilience & Sustainability ──
  #   Feeds the "Climate & Resilience" journal section (previously
  #   unfed — no cluster mapped to it). Angle: building resilient,
  #   low-carbon luxury homes for a hotter/drier/fire-prone California.
  climate_resilience:
    id: "H"
    label: "Climate & Resilience"
    priority: 2
    keywords:
      - "climate resilient home design California"
      - "sustainable luxury home California"
      - "passive cooling Mediterranean architecture"
      - "thermal mass concrete home climate"
      - "drought tolerant luxury landscape California"
      - "net zero luxury home California"
      - "wildfire resilient community design California"
      - "climate adaptation housing California 2026"
      - "heat resilient building design Southern California"
      - "low carbon concrete construction"

  # ── Cluster F: Concrete / Museum-Grade Architecture ──
  concrete_architecture:
    id: "F"
    label: "Concrete Architecture"
    priority: 2
    keywords:
      - "reinforced concrete villa design"
      - "Tadao Ando residential concrete"
      - "museum quality concrete house"
      - "exposed concrete luxury home"
      - "brutalist luxury home California"
      - "Renzo Piano residential concrete"
      - "Palazzo Grassi restoration concrete"
      - "Kimbell Art Museum concrete"

  # ── Cluster G: Rebuild (SECONDARY — news value only) ──
  #   Palisades/Altadena rebuild coverage kept in scope for PR / news hooks.
  #   Radar score should NOT boost this cluster over A-D.
  rebuild_secondary:
    id: "G"
    label: "LA Rebuild (secondary)"
    priority: 3
    keywords:
      - "Pacific Palisades rebuild"
      - "Altadena reconstruction"
      - "LA wildfire rebuild 2026"
      - "Topanga Canyon rebuild"
      - "Malibu rebuild home 2026"
      - "Eaton Fire rebuild progress"


