# MyVilla — Local Press Target List (feature-pitch outreach)
#
# Local LA/SoCal real-estate, luxury & shelter publications we want to
# pitch for a FEATURE / PROFILE on My Villa (not a story-angle pitch on
# their existing article — a proposal that THEY write about us).
#
# Used by: _system/scripts/feature_pitch.py
#
# Flow per outlet:
#   1. Find editorial contact (editorial_scraper on contact_url, or the
#      known_email below if set and verified).
#   2. Generate a brand-feature pitch (Claude, brand voice).
#   3. verified email → auto-send (rate-limited, deduped via ledger).
#      pattern-guess → queue for manual review (never blind-send).
#   4. Dedup via feature_pitch_log.jsonl (un solo pitch per outlet).
#
# Cadence: max 2 new feature pitches/day (avoid looking like a blast).
# Follow-up: NON ancora automatizzato per i feature pitch (la cadence
#            3-touch copre solo i pitch giornalistici). followup_days
#            qui sotto è ASPIRAZIONALE — nessuno script lo legge oggi.

cadence:
  max_per_day: 2
  # Days between feature-pitch touches (a touch more patient than the
  # news-pegged journalist cadence — features are editorial-calendar work).
  followup_days: [10, 24]

outlets:
  # ── Tier 1: luxury RE + design, our core fit ──
  - name: "DIGS"
    domain: "digs.net"
    contact_url: "https://digs.net/contact-us/"
    beat: "luxury real estate, architecture & design — LA Westside / South Bay"
    priority: 1
    # Published contact for South Bay DIGS (same publisher as digs.net),
    # found on their site — verified, not guessed.
    known_email: "contact@southbaydigs.com"

  - name: "Luxe Interiors + Design (California)"
    domain: "luxesource.com"
    contact_url: "https://luxesource.com/contact/"
    beat: "high-end interiors & architecture, California edition"
    priority: 1
    known_email: null

  - name: "Modern Luxury Los Angeles"
    domain: "modernluxury.com"
    contact_url: "https://www.modernluxury.com/los-angeles/contact"
    beat: "LA luxury lifestyle, homes & design"
    priority: 1
    known_email: null

  - name: "LA Confidential"
