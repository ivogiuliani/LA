name: Daily Publish Pipeline

# Pipeline giornaliera: radar → radar_report → journal → publish + digest
# → feature pitch. Rail CLOUD (fallback del launchd locale): 4 trigger
# cron mattutini (04:47/06:17/08:17/10:17 UTC) — basta che uno parta.
# Non richiede il Mac acceso: gira su un runner GitHub Ubuntu.
#
# Manual trigger: dalla tab Actions del repo, click "Run workflow" sul
# workflow "Daily Publish Pipeline". Utile per test e debugging.
on:
  schedule:
    # MULTIPLI trigger mattutini (UTC). Il cron free-tier di GitHub
    # ritarda/salta spesso (osservato: 2.5-6h di ritardo, a volte un
    # giorno saltato). Con un solo trigger, un Mac spento + un cron
    # saltato = nessuna attività (è successo il 2 giugno). Con più
    # trigger, basta che UNO parta. La guard cross-rail (.last_digest_date)
    # + la concorrenza serializzata garantiscono che SOLO il primo che
    # gira faccia il lavoro; gli altri vedono il marker e skippano.
    # CEST = UTC+2 (estate). Il Mac (launchd) è il rail PRIMARIO e gira alle
    # ~08:00 CEST: questi trigger partono DOPO la sua finestra, così il cloud
    # è un vero FALLBACK (se il Mac ha girato, vede il marker e skippa; se il
    # Mac era spento, copre lui). Niente più trigger PRIMA delle 08:00 CEST
    # (preempivano il Mac). Più trigger perché il cron free di GitHub
    # ritarda/salta spesso: basta che UNO parta.
    - cron: "17 6 * * *"    # 06:17 UTC ~ 08:17 CEST (subito dopo il Mac)
    - cron: "17 8 * * *"    # 08:17 UTC ~ 10:17 CEST
    - cron: "17 10 * * *"   # 10:17 UTC ~ 12:17 CEST (rete di sicurezza)
    # (minuti "spaiati" per evitare i picchi di contesa del top-of-hour)
  workflow_dispatch:       # trigger manuale dalla UI di GitHub
    inputs:
      dry_run:
        description: "Dry-run (nessuna mail, nessun push)"
        required: false
        default: "false"

# Il workflow deve poter committare i nuovi articoli pubblicati e
# pusharli sul repo. Permission "contents: write" è il minimo necessario.
permissions:
  contents: write

# Serializza i run: con più trigger cron ravvicinati, evita che due
# girino in parallelo prima che il marker sia scritto (→ doppio invio).
# Il 2° aspetta il 1°, poi la guard lo fa skippare.
concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ───────────────────────────────────────────────────────────
      # 1. Checkout del repo (con credentials per il push automatico)
      # ───────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # storia completa serve a generate_journal
          persist-credentials: true # per il git push finale

      # ───────────────────────────────────────────────────────────
      # 1b. CROSS-RAIL GUARD: il Mac locale (launchd poll-based) di
      #     solito gira PRIMA (~08:00 CEST) e scrive il marker
      #     .last_digest_date con la data di oggi, poi pusha. Questo
      #     workflow gira più tardi (cron GitHub ritardato di 2-4h).
      #     Se il marker è già di oggi → il locale ha già pubblicato
      #     e mandato il digest: SALTIAMO tutti gli step successivi
      #     (niente radar sprecato, niente mail doppia). Il workflow
      #     resta come fallback per quando il Mac è spento.
      #     dry_run forza sempre l'esecuzione (per test manuali).
      # ───────────────────────────────────────────────────────────
      - name: Cross-rail guard (skip se il Mac ha già pubblicato oggi)
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          MARKER="_system/outreach/.last_digest_date"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::dry-run — guard bypassato"
          elif [ -f "$MARKER" ] && [ "$(cat "$MARKER" | tr -d '[:space:]')" = "$TODAY" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Marker già di oggi ($TODAY) — il Mac ha già pubblicato. Skip."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Nessun run del Mac oggi — il workflow procede come fallback."
          fi

      # ───────────────────────────────────────────────────────────
      # 2. Setup Python 3.11 (versione moderna, no warning EOL)
      # ───────────────────────────────────────────────────────────
      - name: Setup Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _system/requirements.txt

      # ───────────────────────────────────────────────────────────
      # 3. Install dependencies
      # ───────────────────────────────────────────────────────────
      - name: Install Python dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r _system/requirements.txt
          # Google auth libs (Gmail OAuth) — non in requirements.txt
          pip install google-auth google-auth-oauthlib google-api-python-client

      # ───────────────────────────────────────────────────────────
      # 4. Restore .env from GitHub Secrets
      # ───────────────────────────────────────────────────────────
      - name: Restore .env from secrets
        if: steps.guard.outputs.should_run == 'true'
        run: |
          cat > .env << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          GOOGLE_CSE_API_KEY=${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ENGINE_ID=${{ secrets.GOOGLE_CSE_ENGINE_ID }}
          BRAVE_API_KEY=${{ secrets.BRAVE_API_KEY }}
          UNSPLASH_APPLICATION_ID=${{ secrets.UNSPLASH_APPLICATION_ID }}
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_SECRET_KEY=${{ secrets.UNSPLASH_SECRET_KEY }}
          APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}
          IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID=${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          X_API_KEY=${{ secrets.X_API_KEY }}
          X_API_SECRET=${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}
          EOF
          chmod 600 .env

      # ───────────────────────────────────────────────────────────
      # 5. Restore Gmail OAuth credentials
      # ───────────────────────────────────────────────────────────
      - name: Restore Gmail OAuth credentials
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p _system/outreach/credentials
          echo '${{ secrets.GMAIL_OAUTH_CLIENT }}' > _system/outreach/credentials/oauth_client.json
          echo '${{ secrets.GMAIL_OAUTH_TOKEN }}' > _system/outreach/credentials/token.json
          chmod 600 _system/outreach/credentials/*.json

      # ───────────────────────────────────────────────────────────
      # 6. Configure git identity for the auto-push
      # ───────────────────────────────────────────────────────────
      - name: Configure git
        if: steps.guard.outputs.should_run == 'true'
        run: |
          git config user.name  "My Villa Bot"
          git config user.email "info@myvilla.la"

      # ───────────────────────────────────────────────────────────
      # 7. Run radar (always — needs today's signals)
      # ───────────────────────────────────────────────────────────
      - name: Run radar
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p _system/radar/reports
          python3 _system/scripts/radar.py
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 7b. Radar report — draft pitch + contatti editoriali + dashboard
      #     HTML. Senza questo, publish_all_drafts non trova giornalisti
      #     nuovi da contattare. Non-bloccante.
      # ───────────────────────────────────────────────────────────
      - name: Generate radar report (drafts + contacts + dashboard)
        if: steps.guard.outputs.should_run == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RADAR_FILE="_system/radar/reports/radar_${TODAY}.json"
          if [ -f "$RADAR_FILE" ]; then
            python3 _system/scripts/generate_radar_report.py --radar "$RADAR_FILE" || \
              echo "::warning::generate_radar_report non-bloccante fallito"
          fi
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 7c. Reply monitor — risposte + bounce giornalisti (60 gg).
      #     Aggiorna replies_log/invalid_addresses/ledger PRIMA dei
      #     follow-up, così chi ha risposto o è bounced non riceve
      #     altri touch. Non-bloccante.
      # ───────────────────────────────────────────────────────────
      - name: Reply monitor (risposte + bounce)
        if: steps.guard.outputs.should_run == 'true'
        run: |
          SINCE=$(date -u -d '60 days ago' +%Y-%m-%d)
          python3 _system/scripts/reply_monitor.py --since "$SINCE" || \
            echo "::warning::reply_monitor non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 8. Generate journal articles from today's radar
      # ───────────────────────────────────────────────────────────
      - name: Generate journal articles
        if: steps.guard.outputs.should_run == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RADAR_FILE="_system/radar/reports/radar_${TODAY}.json"
          if [ ! -f "$RADAR_FILE" ]; then
            echo "::warning::Radar di oggi mancante ($RADAR_FILE) — skip generate_journal"
            exit 0
          fi
          python3 _system/scripts/generate_journal.py \
            --radar "$RADAR_FILE" \
            --min-score 14 \
            --max-articles 3
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 8b. RE-CHECK del marker da origin SUBITO PRIMA del publish.
      #     Il guard iniziale (step 1b) legge il marker al checkout,
      #     ma radar+journal durano minuti: se il rail locale ha
      #     pubblicato NEL FRATTEMPO (e pushato il marker), questo
      #     re-check lo vede e salta gli step irreversibili (invii).
      #     Chiude la finestra di race locale↔cloud.
      # ───────────────────────────────────────────────────────────
      - name: Re-check cross-rail marker (anti-race)
        id: guard2
        if: steps.guard.outputs.should_run == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          git fetch origin main --quiet 2>/dev/null || true
          REMOTE=$(git show origin/main:_system/outreach/.last_digest_date 2>/dev/null | tr -d '[:space:]' || true)
          if [ "${{ github.event.inputs.dry_run }}" != "true" ] && [ "$REMOTE" = "$TODAY" ]; then
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Il rail locale ha pubblicato durante questo run (marker=$TODAY) — salto publish/outreach."
          else
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          fi

      # ───────────────────────────────────────────────────────────
      # 8c. Instagram publisher — pubblica i post APPROVATI (cap
      #     giornaliero, default 1). Senza secrets Meta esce pulito.
      #     Prima del publish così la digest riporta l'esito.
      # ───────────────────────────────────────────────────────────
      - name: Instagram publisher (post approvati)
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          IG_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            IG_FLAG="--dry-run"
          fi
          python3 _system/scripts/ig_publisher.py $IG_FLAG || \
            echo "::warning::ig_publisher non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 8c-bis. X publisher — pubblica i tweet APPROVATI (status:
      #     approved in _drafts/social/, cap X_DAILY_CAP default 4).
      #     Mirror dell'IG publisher. Senza secrets X esce pulito.
      # ───────────────────────────────────────────────────────────
      - name: X publisher (tweet approvati)
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          X_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            X_FLAG="--dry-run"
          fi
          python3 _system/scripts/x_publisher.py --dir --status approved --publish-live $X_FLAG || \
            echo "::warning::x_publisher non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 9. Publish drafts + cold pitch + follow-up + digest email
      # ───────────────────────────────────────────────────────────
      - name: Publish + outreach + digest
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run --no-email --no-push"
            echo "::notice::Dry-run mode — no real send"
          fi
          # --no-push: il git push viene fatto dallo step successivo
          # del workflow, con credenziali GITHUB_TOKEN propriamente
          # configurate. Lo script Python non deve pushare da sé.
          python3 _system/scripts/publish_all_drafts.py --no-push $DRY_RUN_FLAG
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 9a-bis. Proposte social del giorno (2 set reactive IG+X con
      #         immagini auto) — solo card da approvare, non pubblica.
      # ───────────────────────────────────────────────────────────
      - name: Generate social proposals
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RADAR_FILE="_system/radar/reports/radar_${TODAY}.json"
          if [ -f "$RADAR_FILE" ]; then
            python3 _system/scripts/generate_social.py --radar "$RADAR_FILE" --max-posts 2 || \
              echo "::warning::generate_social non-bloccante fallito"
          fi
          # Evergreen (brand-awareness dal sito) — non dipende dal radar.
          python3 _system/scripts/generate_evergreen.py || \
            echo "::warning::generate_evergreen non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 9a-bis. Social digest — email a Ivo+Giana con l'abstract di
      #     TUTTI i contenuti social del pannello (proposte da approvare
      #     + evergreen + commenti ai post virali IG/X + coda). Gira
      #     DOPO la generazione social così fotografa i contenuti
      #     freschi. Solo formattazione (niente LLM). Idempotente: una
      #     volta/giorno (marker su data). Non-bloccante.
      # ───────────────────────────────────────────────────────────
      - name: Social digest (abstract a Ivo+Giana)
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          SD_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            SD_FLAG="--dry-run"
          fi
          python3 _system/scripts/social_digest.py $SD_FLAG || \
            echo "::warning::social_digest non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 9b. Feature pitch — proponi a 1-2 testate locali/giorno un
      #     articolo su My Villa (self-contained, non-bloccante).
      # ───────────────────────────────────────────────────────────
      - name: Feature pitch to local press
        if: steps.guard.outputs.should_run == 'true' && steps.guard2.outputs.should_send == 'true'
        run: |
          FP_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FP_FLAG="--dry-run"
          fi
          python3 _system/scripts/feature_pitch.py $FP_FLAG || \
            echo "::warning::feature_pitch non-bloccante fallito"
        env:
          PYTHONUNBUFFERED: "1"

      # ───────────────────────────────────────────────────────────
      # 10. Commit + push state changes
      # ───────────────────────────────────────────────────────────
      - name: Commit & push state changes
        if: steps.guard.outputs.should_run == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          export GIT_TERMINAL_PROMPT=0
          # Self-heal difensivo: il runner è fresco, ma un retry interrotto
          # (vedi sotto) potrebbe lasciare un rebase a metà che bloccherebbe
          # pull/push. Lo abortiamo prima di toccare l'indice.
          if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
            echo "::warning::rebase appeso sul runner — git rebase --abort"
            git rebase --abort || rm -rf .git/rebase-merge .git/rebase-apply
          fi
          # Aggiungo tutto tranne i file di stato locali non in git.
          # Includo:
          #   - blog/ (nuovi articoli pubblicati)
          #   - _system/outreach/*.json (ledger, log)
          #   - _system/radar/previously_reported.json (dedup)
          #   - sitemap, index, etc (aggiornati da update_*.py)
          # Escludo:
          #   - .env, credentials/* (gitignored — non rischiamo)
          git add -A
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "Daily auto-publish ${TODAY} [skip ci]" \
                     -m "Auto-generated by GitHub Actions" \
                     -m "Co-Authored-By: My Villa Bot <info@myvilla.la>"
          # Push resiliente a un origin avanzato: se il rail LOCALE (Mac) ha
          # pushato durante questo run, `git push HEAD:main` viene rifiutato
          # (non-fast-forward). MAI force-push (clobbererebbe i contenuti
          # pubblicati dal Mac): ci riallineiamo con pull --rebase --autostash
          # — che impila il nostro commit SOPRA quello del Mac — e ritentiamo.
          pushed=0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "::warning::push rifiutato (tentativo $attempt) — pull --rebase --autostash + retry"
            if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
              git rebase --abort || rm -rf .git/rebase-merge .git/rebase-apply
            fi
            git pull --rebase --autostash origin main || \
              { git rebase --abort 2>/dev/null || rm -rf .git/rebase-merge .git/rebase-apply; }
          done
          if [ "$pushed" != "1" ]; then
            echo "::error::push dello stato finale fallito dopo 3 tentativi (nessun force-push: stato non perso, riprende il prossimo run)"
            exit 1
          fi

      # ───────────────────────────────────────────────────────────
      # 11. Cleanup: shred secrets dal runner (best practice)
      # ───────────────────────────────────────────────────────────
      - name: Wipe secrets from runner
        if: always()  # gira anche se uno step precedente è fallito
        run: |
          rm -f .env
          rm -f _system/outreach/credentials/oauth_client.json
          rm -f _system/outreach/credentials/token.json
