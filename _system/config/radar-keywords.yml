# ── Scoring ──
scoring:
  dimensions:
    relevance: { weight: 5, max: 5 }
    recency: { weight: 5, max: 5 }
    engagement: { weight: 5, max: 5 }
    audience_fit: { weight: 5, max: 5 }
    dialogue_openness: { weight: 5, max: 5 }
  thresholds:
    qualified: 15        # Score >= 15 → draft outreach / candidate
    immediate_action: 20 # Score >= 20 → act today
    watchlist: 12        # Score 12-14 → monitor
  # Cluster priority boost (if radar.py supports): priority 1 > 2 > 3.
  # Intent: keep luxury/insurability/materials/Italian-villa ahead of
  # news-style rebuild coverage in the scoring stack.
  cluster_priority_boost:
    priority_1: 3
    priority_2: 1
    priority_3: 0

# ── Instagram viral discovery (Apify) — aggiunto 2026-06-12 ──
# Scan giornaliero degli hashtag di nicchia per trovare post virali
# da commentare (flusso assistito: il commento si pubblica a mano).
# Budget: 6 hashtag × 25 post ≈ 150 risultati/giorno ≈ $10-12/mese
# (attore apify~instagram-scraper, ~$2.3/1000 risultati).
instagram:
  hashtags:
    - MalibuRealEstate
    - LuxuryRealEstateLA
    - BeverlyHillsRealEstate
    - ConcreteArchitecture
    - ItalianVilla
    - LosAngelesArchitecture
  results_per_hashtag: 25
  # Soglie "on-topic relaxed" (come per X): un post di nicchia con
  # 30 like vale più di uno generico con 500.
  min_likes: 30
  min_comments: 5

  # ── Engagement targets (Apify profili) — aggiunto 2026-06-13 ──
  # Account STRATEGICI dove un commento UMANO (mai automatico) porta
  # traffico al profilo @myvilla.la. Ogni mattina il radar prende il
  # post più recente di questi account e ti prepara una bozza di
  # commento; tu la pubblichi a mano dal telefono (5 minuti).
  # NON passano dal filtro viralità: conta il PUBBLICO dell'account,
  # non i like del singolo post.
  #
  # >>> CURALI TU <<< Il valore non è commentare i mega-account
  # (commento sepolto fra migliaia) ma quelli di MEDIA dimensione con
  # pubblico = tuoi clienti: realtor di lusso di Malibu/Beverly Hills,
  # studi di architettura LA, pagine di design/lifestyle locali. Quelli
  # sotto sono solo un punto di partenza reale — aggiungi gli @-handle
  # della tua nicchia che conosci (max ~15 per restare nel budget Apify).
  engagement_targets:
    # Design / architettura (grandi, ma su Reel il commento si vede)
    - dezeen
    - dwell
    - archdaily
    - designmilk
    # Real estate di lusso / lifestyle HNW (pubblico = acquirenti)
    - mansionglobal
    - robbreport
    # ↑ AGGIUNGI QUI: realtor di lusso LA, studi di architettura,
    #   pagine design locali che conosci (es. @nome.studio, @realtor…).
  engagement_posts_per_account: 4   # post recenti scaricati per account
  engagement_max: 6                 # max target/giorno (il pannello ne
                                    # mostra 5; l'AI-skip scarta gli off-topic)
