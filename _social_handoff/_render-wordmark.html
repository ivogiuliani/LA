<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1500px; height:500px; background:#1a1816; overflow:hidden; }
  .wrap { width:1500px; height:500px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
  .wordmark { font-family:'Cormorant Garamond', serif; font-weight:400; font-size:180px; letter-spacing:0.25em; color:#FAF8F5; line-height:1; }
  .divider { width:220px; height:1px; background:#D4B896; opacity:0.6; }
  .tagline { font-family:'Montserrat', sans-serif; font-weight:400; font-size:22px; letter-spacing:0.4em; color:#FAF8F5; opacity:0.85; }
  .tagline .dot { color:#C2714F; padding:0 6px; }
</style>
</head><body>
<div class="wrap">
  <div class="wordmark">MY VILLA</div>
  <div class="divider"></div>
  <div class="tagline">ITALIAN SOUL<span class="dot">·</span>CALIFORNIAN BODY</div>
</div>
</body></html>
