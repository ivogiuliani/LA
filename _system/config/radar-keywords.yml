# ── Reddit Sources ──
reddit:
  subreddits:
    # ── Wealth / luxury market ──
    - "fatFIRE"
    - "RichPeoplePF"
    - "LuxuryRealEstate"
    - "RealEstate"
    - "homebuilding"
    # ── Architecture & design (high-volume visual subs; balance bias toward insurance) ──
    - "architecture"
    - "ModernistArchitecture"
    - "brutalism"
    - "ArchitecturePorn"           # 2.4M members — very high volume
    - "midcenturymodern"           # popular California typology
    - "InteriorDesign"             # 4M members
    - "HouseDesign"                # focused on residential design
    - "DesignPorn"                 # broader design, often surfaces home photography
    # ── Location ──
    - "LosAngeles"
    # ── Pain points / commercial intent ──
    - "Insurance"
    - "AskEngineers"
    - "HomeImprovement"
  # Cap Brave per il discovery Reddit. reddit_search RUOTA la finestra per
  # giorno (fix 2026-07-01), quindi con la lista interlacciata qui sotto ogni
  # giorno esce un mix bilanciato (architettura + villa + assicurazioni +
  # geografia) e nel giro di pochi giorni si coprono TUTTE le keyword.
  brave_query_cap: 4
  search_keywords:
    # INTERLACCIATE 2026-07-01 (architettura / villa / assicurazioni /
    # geografia si ALTERNANO): prima erano raggruppate con le insurance in
    # testa → col cap basso uscivano SOLO thread di incendi/assicurazioni e mai
    # architettura. ⚠️ Non raggruppare per tema: spezza la rotazione bilanciata.
    - "Los Angeles residential architecture"      # architettura
    - "Italian villa California"                  # villa/tipologia
    - "insurable luxury home California"          # assicurazioni
    - "custom home builder Malibu"                # geografia
    - "exposed concrete house design"             # architettura/materiali
    - "Mediterranean villa California"            # villa/tipologia
    - "fire resistant luxury home"                # incendi/assicurazioni
    - "modernist house Los Angeles"               # architettura
    - "custom home Beverly Hills"                 # geografia
    - "reinforced concrete home"                  # materiali (core brand)
    - "contemporary villa California"             # architettura/villa
    - "California home insurance crisis luxury"   # assicurazioni
    - "concrete architecture home"                # architettura
    - "Bel Air custom home"                       # geografia
    - "mid-century modern California home"        # architettura
    - "ICF home build California"                 # materiali
    - "Spanish revival home California"           # architettura/tipologia
    - "luxury home rebuild Pacific Palisades"     # rebuild/geografia
    - "brutalist house design"                    # architettura
    - "California architect custom home"          # architettura/partner

  # ── Submission allowlist (NOSTRI articoli, self-post) ──────────────
  # ⚠️ DIVERSA dalla lista `subreddits` qui sopra (che è per ASCOLTO +
  # commenti). Postare nostri articoli è la cosa più ban-prone su Reddit:
  # qui SOLO i sub "discussione" che tollerano un self-post di valore
  # (link nel corpo, contestualizzato — mai link nudo). I sub immagine/
  # arte (architecture, InteriorDesign, ArchitecturePorn, DesignPorn,
  # midcenturymodern, brutalism...) e i Q&A (Insurance, AskEngineers,
  # HomeImprovement) NON vanno qui: nei primi il blogspam di brand viene
  # rimosso da AutoModerator, nei secondi si partecipa commentando.
  # NB account nuovo/poco karma: aspettarsi rimozioni finché non c'è
  # storia — è normale, prima si costruisce karma con i commenti.
  submission_subreddits:
    - "fatFIRE"            # discussione wealth: writeup "ho costruito..." ok
    - "RealEstate"         # grande sub discussione; self-post di expertise
    - "homebuilding"       # build writeup + lezioni apprese, molto in tema
    - "RichPeoplePF"       # nicchia wealth, più piccolo/severo: usare cautela
    - "LuxuryRealEstate"   # bassa moderazione: l'unico dove un link-post regge


