# ── Scoring ──
scoring:
  dimensions:
    relevance: { weight: 5, max: 5 }
    recency: { weight: 5, max: 5 }
    engagement: { weight: 5, max: 5 }
    audience_fit: { weight: 5, max: 5 }
    dialogue_openness: { weight: 5, max: 5 }
  thresholds:
    qualified: 15        # Score >= 15 → draft outreach / candidate
    immediate_action: 20 # Score >= 20 → act today
    watchlist: 12        # Score 12-14 → monitor
  # Cluster priority boost (if radar.py supports): priority 1 > 2 > 3.
  # Intent: keep luxury/insurability/materials/Italian-villa ahead of
  # news-style rebuild coverage in the scoring stack.
  cluster_priority_boost:
    priority_1: 3
    priority_2: 1
    priority_3: 0

# ── Instagram viral discovery (Apify) — aggiunto 2026-06-12 ──
# Scan giornaliero degli hashtag di nicchia per trovare post virali
# da commentare (flusso assistito: il commento si pubblica a mano).
# Budget: 6 hashtag × 25 post ≈ 150 risultati/giorno ≈ $10-12/mese
# (attore apify~instagram-scraper, ~$2.3/1000 risultati).
instagram:
  # Copertura ALLARGATA (2026-06-14): non solo annunci immobiliari, ma
  # tutte le conversazioni che il target — chi vuole COSTRUIRE/ricostruire
  # una villa di lusso a LA — legge e commenta. 6 aree: compra/vendita,
  # design/architettura, ricostruzione/assicurazioni post-incendio,
  # tipologia villa, lifestyle/Malibu. Lo scorer a valle (ig_viral_radar.py)
  # valuta ogni post sulla domanda: "il target lo leggerebbe e My Villa
  # può aggiungere un commento informato e gradito?" — non solo "è un
  # annuncio?". Cura tu la lista: aggiungi/togli hashtag liberamente.
  hashtags:
    # ── Compra/vendita (real estate di lusso LA) ──
    - MalibuRealEstate
    - LuxuryRealEstateLA
    - BeverlyHillsRealEstate
    - BelAirRealEstate
    - LuxuryHomesLA
    # ── Design / architettura ──
    - LosAngelesArchitecture
    - ConcreteArchitecture
    - ModernArchitecture
    - CaliforniaArchitecture
    - CustomHome
    - LuxuryInteriors
    # ── Ricostruzione / assicurazioni post-incendio ──
    - WildfireRebuild
    - FireResistantHome
    - RebuildLA
    - CaliforniaWildfire
    # ── Tipologia villa italiana/mediterranea ──
    - ItalianVilla
    - MediterraneanHome
    # ── Lifestyle / Malibu ──
    - MalibuLifestyle
    - MalibuLife
    - CaliforniaLiving
    - CoastalLiving
  # 18/hashtag × 22 hashtag ≈ 400 post/run; il pre-filtro engagement+
  # keyword taglia la maggior parte prima dello scoring Claude.
  results_per_hashtag: 18
  # Soglie "on-topic relaxed" (come per X): un post di nicchia con
  # 30 like vale più di uno generico con 500.
  min_likes: 30
  min_comments: 5

  # ── Engagement targets (Apify profili) — aggiunto 2026-06-13 ──
  # Account STRATEGICI dove un commento UMANO (mai automatico) porta
  # traffico al profilo @myvilla.la. Ogni mattina il radar prende il
  # post più recente di questi account e ti prepara una bozza di
  # commento; tu la pubblichi a mano dal telefono (5 minuti).
  # NON passano dal filtro viralità: conta il PUBBLICO dell'account,
  # non i like del singolo post.
  #
  # >>> CURALI TU <<< Il valore non è commentare i mega-account
  # (commento sepolto fra migliaia) ma quelli di MEDIA dimensione con
  # pubblico = tuoi clienti: realtor di lusso di Malibu/Beverly Hills,
  # studi di architettura LA, pagine di design/lifestyle locali. Quelli
  # sotto sono solo un punto di partenza reale — aggiungi gli @-handle
  # della tua nicchia che conosci (max ~15 per restare nel budget Apify).
  # Ritarato 2026-06-13: l'obiettivo è TRAFFICO DI QUALITÀ = compratori
  # HNW + partner (realtor, architetti, developer), NON appassionati di
  # design. Gli account qui sotto sono realtor/broker di lusso LA: il
  # loro pubblico SONO i compratori, e loro stessi sono partner/referral.
  # ⚠️ VERIFICA gli handle (un handle errato non rompe nulla: l'attore
  #    semplicemente non restituisce post) e AGGIUNGI i nomi che conosci.
  # Handle VERIFICATI 2026-06-13 via attore Apify (restituiscono post).
  engagement_targets:
    # Broker / agenti di lusso LA (pubblico = compratori; loro = partner)
    - theagencyre          # The Agency (Umansky) — broker lusso LA ✓
    - aaronkirman          # Aaron Kirman — top agent lusso LA ✓
    - thealtmanbrothers    # The Altman Brothers — Douglas Elliman LA ✓
    - douglaselliman       # Douglas Elliman — arm lusso ✓
    # Media real estate di lusso (pubblico = compratori/HNW)
    - mansionglobal        # Mansion Global ✓
    # ↑ AGGIUNGI QUI gli account della TUA nicchia che conosci (verifica
    #   l'handle esatto dall'URL del profilo): altri realtor di Malibu/BH,
    #   studi di architettura residenziale LA, developer/builder di lusso,
    #   interior designer high-end. Sono questi (media dimensione, pubblico
    #   = clienti reali) a portare il traffico migliore.
    # Scartati perché l'handle non restituiva post: hiltonhyland, dirt.
  engagement_posts_per_account: 4   # post recenti scaricati per account
  engagement_max: 6                 # max target/giorno (il pannello ne
                                    # mostra 5; l'AI-skip scarta gli off-topic)
